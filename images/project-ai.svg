<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <filter id="pixelate">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise"/>
      <feDiffuseLighting in="noise" lighting-color="white" surfaceScale="2" result="light"/>
    </filter>
  </defs>
  
  <rect width="800" height="450" fill="url(#bgGrad)"/>
  
  <!-- Stars -->
  <g fill="#ffffff" opacity="0.6">
    <circle cx="50" cy="50" r="1"/>
    <circle cx="150" cy="80" r="1"/>
    <circle cx="250" cy="40" r="1"/>
    <circle cx="350" cy="70" r="1"/>
    <circle cx="450" cy="30" r="1"/>
    <circle cx="550" cy="60" r="1"/>
    <circle cx="650" cy="45" r="1"/>
    <circle cx="750" cy="55" r="1"/>
    <circle cx="100" cy="120" r="1"/>
    <circle cx="200" cy="100" r="1"/>
    <circle cx="300" cy="130" r="1"/>
    <circle cx="400" cy="110" r="1"/>
    <circle cx="500" cy="125" r="1"/>
    <circle cx="600" cy="95" r="1"/>
    <circle cx="700" cy="115" r="1"/>
  </g>
  
  <!-- City skyline -->
  <rect x="0" y="380" width="800" height="70" fill="#0f0f1a"/>
  
  <!-- Buildings -->
  <rect x="20" y="320" width="40" height="60" fill="#2a2a4a"/>
  <rect x="70" y="280" width="50" height="100" fill="#252545"/>
  <rect x="130" y="340" width="35" height="40" fill="#2a2a4a"/>
  <rect x="175" y="300" width="45" height="80" fill="#222242"/>
  <rect x="230" y="260" width="55" height="120" fill="#282848"/>
  <rect x="295" y="330" width="30" height="50" fill="#2a2a4a"/>
  
  <rect x="400" y="280" width="50" height="100" fill="#252545"/>
  <rect x="460" y="320" width="40" height="60" fill="#2a2a4a"/>
  <rect x="510" y="250" width="60" height="130" fill="#222242"/>
  <rect x="580" y="300" width="45" height="80" fill="#282848"/>
  <rect x="635" y="340" width="35" height="40" fill="#2a2a4a"/>
  <rect x="680" y="290" width="50" height="90" fill="#252545"/>
  <rect x="740" y="330" width="40" height="50" fill="#2a2a4a"/>
  
  <!-- Windows -->
  <g fill="#ffd700" opacity="0.8">
    <rect x="28" y="330" width="6" height="8"/>
    <rect x="36" y="330" width="6" height="8"/>
    <rect x="28" y="345" width="6" height="8"/>
    <rect x="36" y="345" width="6" height="8"/>
    
    <rect x="78" y="300" width="6" height="8"/>
    <rect x="86" y="300" width="6" height="8"/>
    <rect x="78" y="315" width="6" height="8"/>
    <rect x="86" y="315" width="6" height="8"/>
    <rect x="78" y="330" width="6" height="8"/>
    <rect x="86" y="330" width="6" height="8"/>
    
    <rect x="518" y="270" width="6" height="8"/>
    <rect x="526" y="270" width="6" height="8"/>
    <rect x="518" y="285" width="6" height="8"/>
    <rect x="526" y="285" width="6" height="8"/>
    <rect x="518" y="300" width="6" height="8"/>
    <rect x="526" y="300" width="6" height="8"/>
    <rect x="518" y="315" width="6" height="8"/>
    <rect x="526" y="315" width="6" height="8"/>
    
    <rect x="688" y="310" width="6" height="8"/>
    <rect x="696" y="310" width="6" height="8"/>
    <rect x="688" y="325" width="6" height="8"/>
    <rect x="696" y="325" width="6" height="8"/>
  </g>
  
  <!-- Moon -->
  <circle cx="720" cy="80" r="25" fill="#f5f5dc"/>
  <circle cx="728" cy="72" r="6" fill="#d4d4aa"/>
  
  <!-- Laptop -->
  <rect x="300" y="180" width="200" height="120" fill="#2a2a4a" rx="8"/>
  <rect x="295" y="175" width="210" height="8" fill="#1a1a2a" rx="4"/>
  
  <!-- Screen -->
  <rect x="310" y="195" width="170" height="95" fill="#0f0f1a"/>
  
  <!-- Code on screen -->
  <text x="320" y="215" fill="#00ff00" font-family="monospace" font-size="10">def ai_agent():</text>
  <text x="330" y="230" fill="#00ff00" font-family="monospace" font-size="10">    analyze_case()</text>
  <text x="330" y="245" fill="#00ff00" font-family="monospace" font-size="10">    return rating</text>
  
  <!-- AI Robot -->
  <rect x="600" y="200" width="40" height="50" fill="#606080"/>
  <circle cx="620" cy="185" r="18" fill="#8080a0"/>
  <circle cx="612" cy="180" r="3" fill="#00ffff"/>
  <circle cx="628" cy="180" r="3" fill="#00ffff"/>
  <rect x="615" y="190" width="10" height="4" fill="#00ffff"/>
  
  <!-- Neon text -->
  <text x="350" y="140" fill="#00ffff" font-family="Arial Black" font-size="24" text-anchor="middle" opacity="0.9">
    <tspan style="text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff">AI</tspan>
  </text>
  <text x="420" y="140" fill="#ff6b6b" font-family="Arial Black" font-size="24" text-anchor="middle" opacity="0.9">
    <tspan style="text-shadow: 0 0 10px #ff6b6b, 0 0 20px #ff6b6b">AGENT</tspan>
  </text>
  
  <!-- Decorative elements -->
  <rect x="100" y="250" width="8" height="40" fill="#00ffff" opacity="0.3"/>
  <rect x="115" y="260" width="8" height="30" fill="#ff6b6b" opacity="0.3"/>
  <rect x="680" y="250" width="8" height="40" fill="#ff6b6b" opacity="0.3"/>
  <rect x="695" y="260" width="8" height="30" fill="#00ffff" opacity="0.3"/>
  
  <!-- Ground -->
  <rect x="0" y="445" width="800" height="5" fill="#1a1a2a"/>
</svg>